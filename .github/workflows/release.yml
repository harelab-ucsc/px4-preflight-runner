name: Release runner image

on:
  push:
    branches: [main]
    paths:
      - docker/**
      - .github/workflows/release.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-image:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        ros_distro: [humble]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          build-args: ROS_DISTRO=${{ matrix.ros_distro }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/px4-preflight-runner:${{ matrix.ros_distro }}
            ghcr.io/${{ github.repository_owner }}/px4-preflight-runner:${{ matrix.ros_distro }}-${{ github.sha }}
          push: true
          cache-from: type=gha,scope=runner-${{ matrix.ros_distro }}
          cache-to: type=gha,mode=max,scope=runner-${{ matrix.ros_distro }}
